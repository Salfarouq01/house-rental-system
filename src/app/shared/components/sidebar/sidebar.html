<div class="sidebar" [class.collapsed]="collapsed">

  <mat-nav-list>

      @for(menu of menus; track menu.route){

      <a
          mat-list-item
          [routerLink]="menu.route"
          routerLinkActive="active">

          <mat-icon>

              {{menu.icon}}

          </mat-icon>

          @if(!collapsed){

          <span>

              {{menu.title}}

          </span>

          }

      </a>

      }

  </mat-nav-list>

</div>
