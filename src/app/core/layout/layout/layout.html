<mat-sidenav-container class="container">


    <!-- SIDE MENU -->
    
    <mat-sidenav
    mode="side"
    opened>
    
    
    <mat-toolbar>
    Rental System
    </mat-toolbar>
    
    
    
    <mat-nav-list>
    
    
    <a
    mat-list-item
    routerLink="/dashboard">
    
    <mat-icon>
    dashboard
    </mat-icon>
    
    Dashboard
    
    </a>
    
    
    
    <a
    mat-list-item
    routerLink="/houses">
    
    <mat-icon>
    home
    </mat-icon>
    
    Houses
    
    </a>
    
    
    
    <a
    mat-list-item
    routerLink="/rooms">
    
    <mat-icon>
    meeting_room
    </mat-icon>
    
    Rooms
    
    </a>
    
    
    
    <a
    mat-list-item
    routerLink="/tenants">
    
    <mat-icon>
    people
    </mat-icon>
    
    Tenants
    
    </a>
    
    
    
    <a
    mat-list-item
    routerLink="/payments">
    
    <mat-icon>
    payments
    </mat-icon>
    
    Payments
    
    </a>
    
    
    
    <a
    mat-list-item
    routerLink="/reports">
    
    <mat-icon>
    assessment
    </mat-icon>
    
    Reports
    
    </a>
    
    
    
    <a
    mat-list-item
    routerLink="/settings">
    
    <mat-icon>
    settings
    </mat-icon>
    
    Settings
    
    </a>
    
    
    
    <button
    mat-list-item
    (click)="logout()">
    
    
    <mat-icon>
    logout
    </mat-icon>
    
    Logout
    
    
    </button>
    
    
    </mat-nav-list>
    
    
    </mat-sidenav>
    
    
    
    
    <!-- MAIN CONTENT -->
    
    
    <mat-sidenav-content>
    
    
    <mat-toolbar color="primary">
    
    
    <span>
    House Rental Management System
    </span>
    
    
    <span class="space"></span>
    
    
    <button
    mat-icon-button>
    
    <mat-icon>
    account_circle
    </mat-icon>
    
    </button>
    
    
    </mat-toolbar>
    
    
    
    <div class="content">
    
    
    <router-outlet></router-outlet>
    
    
    </div>
    
    
    </mat-sidenav-content>
    
    
    </mat-sidenav-container>
