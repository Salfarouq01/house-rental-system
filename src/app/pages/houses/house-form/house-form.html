<div class="container">


  <mat-card>
  
  
  <h2>
  
  <mat-icon>
  home
  </mat-icon>
  
  {{isEdit?'Edit House':'Add House'}}
  
  </h2>
  
  
  
  
  <form
  [formGroup]="form"
  (ngSubmit)="submit()">
  
  
  
  <mat-form-field appearance="outline">
  
  <mat-label>
  House Name
  </mat-label>
  
  
  <input 
  matInput
  formControlName="name">
  
  
  </mat-form-field>
  
  
  
  
  
  <mat-form-field appearance="outline">
  
  <mat-label>
  Location
  </mat-label>
  
  
  <input 
  matInput
  formControlName="location">
  
  
  </mat-form-field>
  
  
  
  
  
  <mat-form-field appearance="outline">
  
  <mat-label>
  Description
  </mat-label>
  
  
  <textarea
  matInput
  rows="4"
  formControlName="description">
  </textarea>
  
  
  </mat-form-field>
  
  
  
  
  
  
  <mat-form-field appearance="outline">
  
  <mat-label>
  Number of Rooms
  </mat-label>
  
  
  <input
  matInput
  type="number"
  formControlName="rooms">
  
  
  </mat-form-field>
  
  
  
  
  
  <mat-form-field appearance="outline">
  
  <mat-label>
  Monthly Rent (TZS)
  </mat-label>
  
  
  <input
  matInput
  type="number"
  formControlName="rentPerMonth">
  
  
  </mat-form-field>
  
  
  
  
  
  
  <div class="buttons">
  
  
  <button
  mat-raised-button
  color="primary"
  type="submit">
  
  
  <mat-icon>
  save
  </mat-icon>
  
  {{isEdit?'Update':'Save'}}
  
  
  </button>
  
  
  
  
  <button
  mat-button
  type="button"
  (click)="cancel()">
  
  
  Cancel
  
  
  </button>
  
  
  
  </div>
  
  
  
  </form>
  
  
  </mat-card>
  
  
  </div>
