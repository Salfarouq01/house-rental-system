<mat-card>

    <h2>{{ isEdit ? 'Edit Tenant' : 'Add Tenant' }}</h2>
  
    <form [formGroup]="form" (ngSubmit)="save()">
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="firstName">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="lastName">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>Gender</mat-label>
        <mat-select formControlName="gender">
          <mat-option value="Male">Male</mat-option>
          <mat-option value="Female">Female</mat-option>
        </mat-select>
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>Phone</mat-label>
        <input matInput formControlName="phone">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>National ID</mat-label>
        <input matInput formControlName="nationalId">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>Occupation</mat-label>
        <input matInput formControlName="occupation">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>Emergency Contact</mat-label>
        <input matInput formControlName="emergencyContact">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>Room</mat-label>
        <mat-select formControlName="roomId">
  
          <mat-option
            *ngFor="let room of rooms"
            [value]="room.id">
  
            {{ room.roomNumber }} ({{ room.monthlyRent | number }})
  
          </mat-option>
  
        </mat-select>
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="full">
        <mat-label>Move In Date</mat-label>
        <input matInput type="date" formControlName="moveInDate">
      </mat-form-field>
  
      <div class="buttons">
  
        <button mat-raised-button color="primary">
          {{ isEdit ? 'Update' : 'Save' }}
        </button>
  
        <button mat-button type="button" (click)="cancel()">
          Cancel
        </button>
  
      </div>
  
    </form>
  
  </mat-card>
