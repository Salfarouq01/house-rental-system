<mat-card>

    <div class="header">
  
      <h2>Rooms</h2>
  
      <button
        mat-raised-button
        color="primary"
        (click)="addRoom()">
  
        <mat-icon>add</mat-icon>
        Add Room
  
      </button>
  
    </div>
  
    <table mat-table [dataSource]="rooms" class="mat-elevation-z2">
  
      <!-- Room Number -->
      <ng-container matColumnDef="roomNumber">
        <th mat-header-cell *matHeaderCellDef>Room</th>
        <td mat-cell *matCellDef="let room">
          {{ room.roomNumber }}
        </td>
      </ng-container>
  
      <!-- House -->
      <ng-container matColumnDef="houseId">
        <th mat-header-cell *matHeaderCellDef>House</th>
        <td mat-cell *matCellDef="let room">
            {{ getHouseName(room.houseId) }}
        </td>
      </ng-container>
  
      <!-- Floor -->
      <ng-container matColumnDef="floor">
        <th mat-header-cell *matHeaderCellDef>Floor</th>
        <td mat-cell *matCellDef="let room">
          {{ room.floor }}
        </td>
      </ng-container>
  
      <!-- Type -->
      <ng-container matColumnDef="roomType">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let room">
          {{ room.roomType }}
        </td>
      </ng-container>
  
      <!-- Capacity -->
      <ng-container matColumnDef="capacity">
        <th mat-header-cell *matHeaderCellDef>Capacity</th>
        <td mat-cell *matCellDef="let room">
          {{ room.capacity }}
        </td>
      </ng-container>
  
      <!-- Occupied -->
      <ng-container matColumnDef="occupied">
        <th mat-header-cell *matHeaderCellDef>Occupied</th>
        <td mat-cell *matCellDef="let room">
          {{ room.occupied }}
        </td>
      </ng-container>
  
      <!-- Rent -->
      <ng-container matColumnDef="monthlyRent">
        <th mat-header-cell *matHeaderCellDef>Monthly Rent</th>
        <td mat-cell *matCellDef="let room">
          {{ room.monthlyRent | number }}
        </td>
      </ng-container>
  
      <!-- Status -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let room">

            <span
                class="status"
                [ngClass]="{
                  'available': room.status === 'Available',
                  'occupied': room.status === 'Occupied',
                  'maintenance': room.status === 'Maintenance'
                }">
        
                {{ room.status }}
        
            </span>
        
        </td>
      </ng-container>
  
      <!-- Actions -->
      <ng-container matColumnDef="actions">
  
        <th mat-header-cell *matHeaderCellDef>Actions</th>
  
        <td mat-cell *matCellDef="let room">
  
          <button
            mat-icon-button
            color="primary"
            (click)="editRoom(room.id)">
  
            <mat-icon>edit</mat-icon>
  
          </button>
  
          <button
            mat-icon-button
            color="warn"
            (click)="deleteRoom(room.id)">
  
            <mat-icon>delete</mat-icon>
  
          </button>
  
        </td>
  
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
    </table>
  
  </mat-card>
