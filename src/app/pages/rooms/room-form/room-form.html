<mat-card>

    <h2>{{ isEdit ? 'Edit Room' : 'Add Room' }}</h2>

    <form [formGroup]="form" (ngSubmit)="save()">

        <mat-form-field appearance="outline" class="full">

            <mat-label>Room Number</mat-label>

            <input
                matInput
                formControlName="roomNumber">

        </mat-form-field>

        <mat-form-field appearance="outline" class="full">

            <mat-label>House</mat-label>

            <mat-select formControlName="houseId">

                <mat-option
                    *ngFor="let house of houses"
                    [value]="house.id">

                    {{ house.name }}

                </mat-option>

            </mat-select>

        </mat-form-field>

        <mat-form-field appearance="outline" class="full">

            <mat-label>Floor</mat-label>

            <input
                matInput
                type="number"
                formControlName="floor">

        </mat-form-field>

        <mat-form-field appearance="outline" class="full">

            <mat-label>Room Type</mat-label>

            <mat-select formControlName="roomType">

                <mat-option value="Single">Single</mat-option>

                <mat-option value="Double">Double</mat-option>

                <mat-option value="Studio">Studio</mat-option>

                <mat-option value="Apartment">Apartment</mat-option>

            </mat-select>

        </mat-form-field>

        <mat-form-field appearance="outline" class="full">

            <mat-label>Capacity</mat-label>

            <input
                matInput
                type="number"
                formControlName="capacity">

        </mat-form-field>

        <mat-form-field appearance="outline" class="full">

            <mat-label>Monthly Rent</mat-label>

            <input
                matInput
                type="number"
                formControlName="monthlyRent">

        </mat-form-field>

        <mat-form-field appearance="outline" class="full">

            <mat-label>Status</mat-label>

            <mat-select formControlName="status">

                <mat-option value="Available">Available</mat-option>

                <mat-option value="Occupied">Occupied</mat-option>

                <mat-option value="Maintenance">Maintenance</mat-option>

            </mat-select>

        </mat-form-field>

        <mat-form-field appearance="outline" class="full">

            <mat-label>Description</mat-label>

            <textarea
                matInput
                rows="3"
                formControlName="description">
            </textarea>

        </mat-form-field>

        <div class="buttons">

            <button
                mat-raised-button
                color="primary">

                {{ isEdit ? 'Update' : 'Save' }}

            </button>

            <button
                mat-raised-button
                type="button"
                color="warn"
                (click)="cancel()">

                Cancel

            </button>

        </div>

    </form>

</mat-card>
