<div class="dashboard-container">

    <h2 class="title">Dashboard Overview</h2>
    <p class="subtitle">Welcome to House Rental Management System</p>
  
    <div class="grid">
  
      <mat-card class="card"
                *ngFor="let item of stats"
                [style.border-left]="'6px solid ' + item.color">
  
        <div class="card-content">
  
          <div class="icon" [style.color]="item.color">
            <mat-icon>{{ item.icon }}</mat-icon>
          </div>
  
          <div class="info">
            <h3>{{ item.value }}</h3>
            <p>{{ item.title }}</p>
          </div>
  
        </div>
  
      </mat-card>
  
    </div>
  
  </div>
